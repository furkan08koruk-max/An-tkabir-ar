<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Anıtkabir AR Projesi</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* KAMERAYI TAM EKRANA HAPSETMEK İÇİN AGRESİF CSS */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        
        video, canvas {
            width: 100vw !important; height: 100vh !important;
            object-fit: cover !important; position: fixed !important;
            top: 0 !important; left: 0 !important; z-index: -1 !important;
        }

        /* ŞEFFAF ANITKABİR KIRMIZISI ARAYÜZ */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; pointer-events: none; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .scan-box {
            width: 260px; height: 260px; border: 2px solid #ff0000;
            border-radius: 25px; position: relative;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            background: rgba(255, 0, 0, 0.05);
        }

        .laser {
            width: 100%; height: 2px; background: #ff0000;
            position: absolute; box-shadow: 0 0 10px #ff0000;
            animation: laserMove 3s infinite ease-in-out;
        }

        @keyframes laserMove { 0%, 100% { top: 10%; } 50% { top: 90%; } }

        #msg {
            margin-top: 25px; color: #fff; font-family: sans-serif;
            font-weight: bold; background: rgba(150, 0, 0, 0.7);
            padding: 10px 20px; border-radius: 20px; border: 1px solid #ff0000;
        }

        /* BİLGİ VE SES PANELİ */
        #info {
            position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0, 0, 0, 0.9); border-top: 3px solid #ff0000;
            color: #fff; padding: 20px; text-align: center; z-index: 101;
            transition: bottom 0.5s ease; border-radius: 15px 15px 0 0;
        }
        .active { bottom: 0 !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="scan-box"><div class="laser"></div></div>
        <div id="msg">GÖRSELİ TARATIN</div>
    </div>

    <div id="info">
        <h3 style="color:#ff0000; margin:0;">ANITKABİR</h3>
        <p style="font-size:12px;">Sesli anlatım başlatıldı...</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #none; uiError: #none; uiLoading: #none; autoStart: true;" 
        embedded color-space="sRGB" renderer="colorManagement: true" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="model" src="./models/anitkabir.glb"></a-asset-item>
            <audio id="ses" src="audio/anitkabir_bilgi.mp3" preload="auto"></audio>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-light type="point" color="#ff0000" intensity="2" position="0 1 1"></a-light>
            <a-gltf-model src="#model" position="0 0 0.1" scale="0.15 0.15 0.15"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 10000;">
            </a-gltf-model>
            <a-ring color="#ff0000" radius-inner="0.3" radius-outer="0.35" rotation="-90 0 0" 
                animation="property: scale; to: 1.3 1.3 1.3; dur: 2000; loop: true; dir: alternate">
            </a-ring>
        </a-entity>
    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        const target = document.querySelector('#target');
        const audio = document.querySelector('#ses');

        // Kamera Boyutunu Her Saniye Kontrol Et ve Zorla
        const fixCam = () => {
            const v = document.querySelector('video');
            if (v) {
                v.style.width = window.innerWidth + "px";
                v.style.height = window.innerHeight + "px";
            }
        };

        // Kullanıcı ekrana dokunduğunda sesi serbest bırak
        window.addEventListener('click', () => { audio.play(); audio.pause(); }, {once: true});

        scene.addEventListener("arReady", fixCam);
        window.addEventListener("resize", fixCam);
        setInterval(fixCam, 1000); // Kamera kaymasını önlemek için her saniye check

        target.addEventListener("targetFound", () => {
            document.querySelector('#ui-layer').style.opacity = "0";
            document.querySelector('#info').classList.add('active');
            audio.play();
        });

        target.addEventListener("targetLost", () => {
            document.querySelector('#ui-layer').style.opacity = "1";
            document.querySelector('#info').classList.remove('active');
            audio.pause();
        });
    </script>
</body>
</html>
