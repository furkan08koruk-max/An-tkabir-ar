<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
      #welcome-screen {
        position: fixed; inset: 0; background: #1a1a1a;
        display: flex; flex-direction: column; justify-content: center;
        align-items: center; color: white; z-index: 9999;
      }
      #start-button {
        padding: 20px 40px; font-size: 20px; background: #f1c40f;
        color: #000; border: none; border-radius: 50px; cursor: pointer;
        font-weight: bold; margin-top: 20px;
      }
      #error-log {
        position: fixed; bottom: 10px; left: 10px; color: red;
        font-size: 12px; z-index: 10000; background: rgba(0,0,0,0.7);
      }
    </style>
  </head>
  <body>

    <div id="welcome-screen">
      <h1 style="letter-spacing: 3px;">ANITKABİR AR</h1>
      <p>Kamerayı başlatmak için dokun</p>
      <button id="start-button">BAŞLAT</button>
    </div>

    <div id="error-log"></div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets%20(4).mind; autoStart: false; uiScanning: yes;" 
      embedded color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target0" mindar-image-target="targetIndex: 0">
        <a-box position="0 0 0" scale="0.5 0.5 0.5" color="red"></a-box>
      </a-entity>
    </a-scene>

    <script>
      const log = (msg) => { document.getElementById('error-log').innerHTML += msg + "<br>"; };
      
      window.addEventListener('load', () => {
        const startButton = document.querySelector('#start-button');
        const welcomeScreen = document.querySelector('#welcome-screen');
        const sceneEl = document.querySelector('a-scene');

        startButton.addEventListener('click', () => {
          log("Başlatılıyor...");
          
          // 1. Ekranı gizle
          welcomeScreen.style.display = 'none';

          // 2. Sistemi başlatmayı dene
          try {
            const arSystem = sceneEl.systems['mindar-image-system'];
            arSystem.start(); 
            log("Sistem start komutu verildi.");
          } catch (err) {
            log("Hata: " + err.message);
            alert("Kamera başlatılamadı: " + err.message);
          }
        });
      });

      // Kamera izin hatalarını yakala
      window.addEventListener("arjs-video-error", (e) => {
        log("Kamera Hatası: İzin verilmedi veya bulunamadı.");
      });
    </script>
  </body>
</html>
