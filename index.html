<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anıtkabir Hologram AR - Ibrahim Yildirim</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* Kamera Görüntüsünü Tam Ekran Yapma Fix */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        
        canvas { width: 100% !important; height: 100% !important; top: 0; left: 0; position: absolute; }
        video { width: 100% !important; height: 100% !important; object-fit: cover !important; position: absolute; top: 0; left: 0; }

        /* Anıtkabir Kırmızısı Tema */
        #ar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Kamera arkada görünsün diye şeffaflık verildi */
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }

        /* Sadeleştirilmiş Tarama Çerçevesi */
        .scan-container {
            width: 280px; height: 280px;
            border: 2px solid rgba(255, 0, 0, 0.5);
            border-radius: 40px; position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .scan-line {
            width: 90%; height: 2px; background: linear-gradient(90deg, transparent, #ff0000, transparent);
            box-shadow: 0 0 15px #ff0000; position: absolute;
            animation: moveLine 3s ease-in-out infinite;
        }

        @keyframes moveLine {
            0%, 100% { transform: translateY(-100px); opacity: 0.2; }
            50% { transform: translateY(100px); opacity: 1; }
        }

        #status-text {
            color: #ff0000; font-family: sans-serif; font-weight: bold;
            margin-top: 30px; letter-spacing: 2px; text-shadow: 0 0 10px #000;
        }

        /* Alt Bilgi Paneli */
        #info-panel {
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
            width: 80%; background: linear-gradient(to right, transparent, #8b0000, transparent);
            color: white; padding: 15px; border-radius: 20px; text-align: center;
            z-index: 1001; transition: bottom 0.5s; font-family: serif;
        }

        .show-info { bottom: 40px !important; }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ar-overlay">
        <div class="scan-container">
            <div class="scan-line"></div>
        </div>
        <div id="status-text">ANITKABİR GÖRSELİNİ TARAYIN</div>
    </div>

    <div id="info-panel">
        <h2 style="margin:0">ANITKABİR</h2>
        <p style="margin:5px 0 0 0; font-size: 14px">Hologram Sistemi Aktif</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #none; uiError: #none; uiLoading: #none; autoStart: true;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="anitModel" src="./models/anitkabir.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target0" mindar-image-target="targetIndex: 0">
            
            <a-entity id="hologram">
                <a-light type="point" color="#ff0000" intensity="1.5" position="0 1 1"></a-light>
                
                <a-gltf-model 
                    src="#anitModel" 
                    position="0 0 0.1" 
                    scale="0.15 0.15 0.15"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
                </a-gltf-model>

                <a-ring color="#ff0000" radius-inner="0.3" radius-outer="0.35" rotation="-90 0 0" 
                        position="0 -0.1 0" opacity="0.8"
                        animation="property: scale; to: 1.3 1.3 1.3; dur: 1500; loop: true; dir: alternate">
                </a-ring>
            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const overlay = document.querySelector('#ar-overlay');
        const info = document.querySelector('#info-panel');
        const target = document.querySelector('#target0');

        // Hedef bulundu
        target.addEventListener("targetFound", () => {
            overlay.classList.add("hidden");
            info.classList.add("show-info");
        });

        // Hedef kayboldu
        target.addEventListener("targetLost", () => {
            overlay.classList.remove("hidden");
            info.classList.remove("show-info");
        });

        // Kamera tam ekran zorlaması için küçük bir destek
        window.addEventListener('resize', () => {
            const video = document.querySelector('video');
            if (video) {
                video.style.width = window.innerWidth + 'px';
                video.style.height = window.innerHeight + 'px';
            }
        });
    </script>
</body>
</html>
