<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anıtkabir AR | Ibrahim Yildirim</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* 1. KRİTİK AYAR: Kameranın her zaman tam ekran ve arkada görünmesini sağlar */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        
        /* Video ve Canvas katmanlarını zorla tam ekran yap */
        video, canvas { 
            width: 100vw !important; height: 100vh !important; 
            object-fit: cover !important; position: absolute; top: 0; left: 0; 
        }

        /* 2. ANITKABİR KIRMIZISI ARAYÜZ (Z-Index: 10) */
        #ui-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between;
            pointer-events: none; /* Kameraya tıklamayı engellememesi için */
            padding: 50px 0; box-sizing: border-box;
        }

        .header-text {
            color: #fff; font-family: 'Times New Roman', serif;
            font-size: 24px; letter-spacing: 3px; text-shadow: 0 0 10px #ff0000;
            opacity: 0.9;
        }

        /* Sadeleştirilmiş Kırmızı Tarama Çerçevesi */
        .scan-container {
            width: 80%; max-width: 300px; height: 300px;
            border: 2px solid rgba(255, 0, 0, 0.6);
            border-radius: 30px; position: relative;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            display: flex; align-items: center; justify-content: center;
        }

        .scan-line {
            width: 100%; height: 3px; background: #ff0000;
            box-shadow: 0 0 15px #ff0000; position: absolute;
            animation: moveLine 3s ease-in-out infinite;
        }

        @keyframes moveLine {
            0%, 100% { transform: translateY(-130px); opacity: 0.3; }
            50% { transform: translateY(130px); opacity: 1; }
        }

        .scan-button {
            background: linear-gradient(135deg, #8b0000 0%, #ff0000 100%);
            color: white; border: none; padding: 15px 40px;
            border-radius: 50px; font-weight: bold; letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
            text-transform: uppercase; margin-bottom: 20px;
        }

        /* Hologram Paneli (Gizli Başlar) */
        #hologram-panel {
            position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%);
            width: 90%; background: rgba(0, 0, 0, 0.85);
            border-top: 3px solid #ff0000; color: white;
            padding: 20px; text-align: center; z-index: 100;
            transition: bottom 0.5s ease-out; border-radius: 20px 20px 0 0;
        }

        .active { bottom: 0 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="header-text">ANITKABİR AR</div>
        
        <div id="scanner-visual" class="scan-container">
            <div class="scan-line"></div>
        </div>

        <div class="scan-button">Sistem Aktif</div>
    </div>

    <div id="hologram-panel">
        <h2 style="margin: 0; color: #ff0000;">ANITKABİR</h2>
        <p style="margin: 10px 0 0 0; opacity: 0.8;">3D Hologram Modeli Yansıtılıyor...</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #none; uiError: #none; uiLoading: #none;" 
        embedded color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="anitkabirModel" src="./models/anitkabir.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target0" mindar-image-target="targetIndex: 0">
            
            <a-entity>
                <a-light type="point" color="#ff0000" intensity="2" position="0 1 1"></a-light>
                
                <a-gltf-model 
                    src="#anitkabirModel" 
                    position="0 0 0.1" 
                    scale="0.15 0.15 0.15"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
                </a-gltf-model>

                <a-ring color="#ff0000" radius-inner="0.3" radius-outer="0.35" rotation="-90 0 0" 
                        position="0 -0.1 0" opacity="0.8"
                        animation="property: scale; to: 1.3 1.3 1.3; dur: 1500; loop: true; dir: alternate">
                </a-ring>
            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        const uiLayer = document.querySelector('#ui-layer');
        const scannerVisual = document.querySelector('#scanner-visual');
        const hologramPanel = document.querySelector('#hologram-panel');
        const targetEntity = document.querySelector('#target0');

        // Target Bulundu
        targetEntity.addEventListener("targetFound", () => {
            scannerVisual.classList.add("hidden");
            hologramPanel.classList.add("active");
            console.log("Anıtkabir Tespit Edildi!");
        });

        // Target Kaybedildi
        targetEntity.addEventListener("targetLost", () => {
            scannerVisual.classList.remove("hidden");
            hologramPanel.classList.remove("active");
        });

        // Kamera zorlama ve video boyutlandırma
        window.addEventListener('load', () => {
            setTimeout(() => {
                const video = document.querySelector('video');
                if (video) {
                    video.style.position = "fixed";
                    video.style.top = "0";
                    video.style.left = "0";
                    video.style.zIndex = "1"; // UI'ın arkasında kalması için
                }
            }, 2000);
        });
    </script>
</body>
</html>
