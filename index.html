<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      
      /* Giriş Ekranı - Tam Ekran */
      #welcome-screen {
        position: fixed; inset: 0; 
        background: linear-gradient(180deg, #1a1a1a, #000);
        display: flex; flex-direction: column; justify-content: center;
        align-items: center; color: white; z-index: 9999;
        text-align: center;
      }

      #start-button {
        padding: 15px 40px; font-size: 20px; background: #c0392b;
        color: white; border: none; border-radius: 5px; cursor: pointer;
        font-weight: bold; margin-top: 20px; box-shadow: 0 0 15px rgba(192, 57, 43, 0.5);
      }

      /* Kameranın tam ekran olmasını sağlayan kritik CSS */
      .mindar-ui-overlay { z-index: 500; }
      canvas { width: 100% !important; height: 100% !important; }
    </style>
  </head>
  <body>

    <div id="welcome-screen">
      <h1 style="letter-spacing: 2px;">ANITKABİR AR</h1>
      <p style="opacity: 0.7;">Deneyimi başlatmak için dokun</p>
      <button id="start-button">KEŞFET</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets%20(4).mind; autoStart: false; uiScanning: yes;" 
      embedded
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="anitkabirModel" src="./model.glb"></a-asset-item>
        <audio id="anitkabirSes" src="./bilgi.mp3" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target0" mindar-image-target="targetIndex: 0">
          <a-sphere position="0 0 0" radius="0.2" color="#fff" opacity="0.6"></a-sphere>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector('#start-button');
      const welcomeScreen = document.querySelector('#welcome-screen');
      const sceneEl = document.querySelector('a-scene');
      const audioEl = document.querySelector('#anitkabirSes');

      startButton.addEventListener('click', () => {
        welcomeScreen.style.display = 'none';
        
        // Kamerayı zorla başlat
        const arSystem = sceneEl.systems['mindar-image-system'];
        arSystem.start(); 

        // Sesi aktifleştir
        if(audioEl) {
            audioEl.play().then(() => {
                audioEl.pause();
                audioEl.currentTime = 0;
            }).catch(e => console.log("Ses hazır değil."));
        }
      });

      const target0 = document.querySelector('#target0');
      target0.addEventListener("targetFound", () => {
        if(audioEl) audioEl.play();
      });
      target0.addEventListener("targetLost", () => {
        if(audioEl) audioEl.pause();
      });
    </script>
  </body>
</html>
