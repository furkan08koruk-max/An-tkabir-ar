<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
      
      /* Giriş Ekranı Tasarımı */
      #welcome-screen {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #2c3e50, #000000);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        z-index: 1000;
        text-align: center;
      }

      .logo-container {
        width: 150px;
        height: 150px;
        margin-bottom: 20px;
        border: 3px solid #f1c40f;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgba(255, 255, 255, 0.1);
      }

      h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }
      p { opacity: 0.8; margin-top: 10px; font-size: 14px; }

      #start-button {
        margin-top: 30px;
        padding: 15px 40px;
        font-size: 18px;
        font-weight: bold;
        background-color: #f1c40f;
        color: #2c3e50;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: transform 0.2s, background-color 0.2s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }

      #start-button:active {
        transform: scale(0.95);
        background-color: #d4ac0d;
      }
    </style>
  </head>
  <body>

    <div id="welcome-screen">
      <div class="logo-container">
        <span style="font-size: 60px;">🏛️</span>
      </div>
      <h1>ANITKABİR AR</h1>
      <p>Deneyimi başlatmak için aşağıdaki butona tıkla<br>ve kameraya izin ver.</p>
      <button id="start-button">KEŞFETMEYE BAŞLA</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="anitkabirModel" src="./model.glb"></a-asset-item>
        <audio id="anitkabirSes" src="./bilgi.mp3" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target0" mindar-image-target="targetIndex: 0">
        <a-gltf-model src="#anitkabirModel" position="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
        <a-box position="0 0 0" scale="0.2 0.2 0.2" color="red" opacity="0.5"></a-box>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector('#start-button');
      const welcomeScreen = document.querySelector('#welcome-screen');
      const sceneEl = document.querySelector('a-scene');
      const audioEl = document.querySelector('#anitkabirSes');

      startButton.addEventListener('click', () => {
        // Giriş ekranını tamamen kaldır
        welcomeScreen.style.display = 'none';
        
        // Kamerayı ve AR sistemini başlat
        sceneEl.systems['mindar-image-system'].start(); 
        
        // Ses dosyasını kullanıcı etkileşimiyle hazırla
        if(audioEl) {
          audioEl.play().then(() => {
            audioEl.pause();
            audioEl.currentTime = 0;
          }).catch(e => console.log("Ses dosyası henüz yüklenmedi veya yok."));
        }
      });

      // Hedef algılama olayları
      const target0 = document.querySelector('#target0');
      target0.addEventListener("targetFound", () => {
        if(audioEl) audioEl.play();
      });
      target0.addEventListener("targetLost", () => {
        if(audioEl) audioEl.pause();
      });
    </script>
  </body>
</html>
