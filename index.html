<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
      #welcome {
        position: fixed; inset: 0; background: #2c3e50;
        display: flex; flex-direction: column; justify-content: center;
        align-items: center; color: white; z-index: 9999;
      }
      #btn {
        padding: 15px 35px; font-size: 18px; background: #f1c40f;
        color: #2c3e50; border: none; border-radius: 5px; font-weight: bold;
      }
    </style>
  </head>
  <body>

    <div id="welcome">
      <h1>ANITKABİR AR</h1>
      <button id="btn">BAŞLAT</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiScanning: yes;" 
             embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target0" mindar-image-target="targetIndex: 0">
        <a-sphere position="0 0 0" radius="0.1" color="white"></a-sphere>
      </a-entity>
    </a-scene>

    <script>
      const btn = document.querySelector('#btn');
      const welcome = document.querySelector('#welcome');
      const sceneEl = document.querySelector('a-scene');

      btn.addEventListener('click', () => {
        welcome.style.display = 'none';
        // Kamerayı tetikle
        sceneEl.systems['mindar-image-system'].start(); 
      });
    </script>
  </body>
</html>
