<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Anıtkabir AR Hologram Projesi v2.0</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* Arayüz Tasarımı */
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        /* Gelişmiş Yükleme ve Tarama Ekranı */
        #ar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,20,40,0.8) 0%, rgba(0,0,0,1) 100%);
            z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #00fff2; text-align: center; transition: all 0.5s ease;
        }

        .loader-circle {
            width: 150px; height: 150px; border: 3px solid transparent;
            border-top: 3px solid #00fff2; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .scan-box {
            width: 280px; height: 200px; border: 2px solid rgba(0, 255, 242, 0.5);
            position: relative; border-radius: 15px; overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 242, 0.2);
        }

        .scan-line {
            width: 100%; height: 4px; background: linear-gradient(to bottom, transparent, #00fff2);
            position: absolute; top: -10%; animation: moveLine 2.5s infinite ease-in-out;
            box-shadow: 0 0 15px #00fff2;
        }

        @keyframes moveLine { 0% { top: -10%; } 50% { top: 100%; } 100% { top: -10%; } }

        /* Bilgi Paneli */
        #info-panel {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 40, 60, 0.7); padding: 15px 25px;
            border-radius: 30px; border: 1px solid #00fff2; color: white;
            z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.5s;
            font-size: 14px; text-transform: uppercase; letter-spacing: 2px;
        }

        /* Kamera Hatası Durumu */
        .error-message { color: #ff4444; padding: 20px; display: none; }
        
        .visible { opacity: 1 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ar-overlay">
        <div class="loader-circle"></div>
        <div class="scan-box">
            <div class="scan-line"></div>
        </div>
        <h2>SİSTEM AKTİF</h2>
        <p>Anıtkabir Görselini (anıtkabir.jpg) Taratın</p>
        <div id="camera-error" class="error-message">
            Kamera erişimi engellendi! Lütfen HTTPS ve izinleri kontrol edin.
        </div>
    </div>

    <div id="info-panel">Hologram Aktif: Anıtkabir</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #none; filterMinCF:0.0001; filterBeta: 0.001;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights, antialias: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="anitkabirModel" src="./models/anitkabir.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

        <a-entity id="target1" mindar-image-target="targetIndex: 0">
            
            <a-light type="point" color="#00fff2" intensity="2" position="0 1 0"></a-light>
            <a-light type="ambient" color="#404040"></a-light>

            <a-entity id="hologram-wrapper" rotation="0 0 0">
                
                <a-gltf-model 
                    src="#anitkabirModel" 
                    position="0 0 0" 
                    scale="0.2 0.2 0.2" 
                    rotation="0 0 0"
                    material="transparent: true; opacity: 0.9;"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
                </a-gltf-model>

                <a-ring color="#00fff2" radius-inner="0.4" radius-outer="0.42" rotation="-90 0 0" position="0 -0.2 0"
                        animation="property: scale; to: 1.5 1.5 1.5; dur: 2000; loop: true; dir: alternate">
                </a-ring>
                
                <a-ring color="#00fff2" radius-inner="0.5" radius-outer="0.51" rotation="-90 0 0" position="0 -0.25 0"
                        animation="property: opacity; to: 0; dur: 1500; loop: true; easing: easeOutQuad">
                </a-ring>

                <a-cylinder color="#00fff2" height="1" radius="0.4" opacity="0.1" position="0 0.3 0" 
                            open-ended="true" side="double">
                </a-cylinder>
            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        // Sistem Kontrol Mekanizması
        const sceneEl = document.querySelector('a-scene');
        const overlay = document.querySelector('#ar-overlay');
        const infoPanel = document.querySelector('#info-panel');
        const targetEntity = document.querySelector('#target1');

        // Kamera Başlatma Kontrolü
        sceneEl.addEventListener("renderstart", () => {
            console.log("AR Sistemi Başlatıldı");
        });

        // Hedef Bulundu Efekti
        targetEntity.addEventListener("targetFound", () => {
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.classList.add("hidden"); }, 500);
            infoPanel.classList.add("visible");
            console.log("Anıtkabir Tespit Edildi!");
        });

        // Hedef Kaybedildi Efekti
        targetEntity.addEventListener("targetLost", () => {
            overlay.classList.remove("hidden");
            setTimeout(() => { overlay.style.opacity = "1"; }, 10);
            infoPanel.classList.remove("visible");
        });

        // Tarayıcı Hata Yakalama
        window.addEventListener('error', function(e) {
            if(e.message.includes('camera')) {
                document.querySelector('#camera-error').style.display = 'block';
            }
        });
    </script>
</body>
</html>
