<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anıtkabir AR - Ibrahim Yildirim</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }

        /* Sade ve Ortalanmış Tarama Ekranı */
        #ar-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10; /* Kameranın üstünde ama etkileşimi kesmez */
            pointer-events: none; /* Kameraya dokunmayı engellemez */
        }

        /* Ortadaki Sade Tarama Kutusu */
        .scan-container {
            width: 280px;
            height: 280px;
            border: 2px solid rgba(255, 0, 0, 0.5);
            border-radius: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Köşe Çizgileri */
        .corner {
            position: absolute; width: 30px; height: 30px; border: 4px solid #ff0000;
        }
        .top-left { top: -5px; left: -5px; border-right: 0; border-bottom: 0; border-top-left-radius: 10px; }
        .top-right { top: -5px; right: -5px; border-left: 0; border-bottom: 0; border-top-right-radius: 10px; }
        .bottom-left { bottom: -5px; left: -5px; border-right: 0; border-top: 0; border-bottom-left-radius: 10px; }
        .bottom-right { bottom: -5px; right: -5px; border-left: 0; border-top: 0; border-bottom-right-radius: 10px; }

        /* Sade Kırmızı Tarama Çizgisi */
        .scan-line {
            width: 90%; height: 2px; background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
            position: absolute;
            animation: move 2.5s infinite ease-in-out;
        }

        @keyframes move {
            0%, 100% { top: 10%; opacity: 0.3; }
            50% { top: 90%; opacity: 1; }
        }

        #instruction {
            margin-top: 30px; color: #ff0000; font-family: sans-serif;
            font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
            background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ar-overlay">
        <div class="scan-container">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
            <div class="scan-line"></div>
        </div>
        <div id="instruction">Görseli Taratın</div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #none; filterMinCF:0.0001; filterBeta: 0.001;" 
        embedded color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="anitModel" src="./models/anitkabir.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target0" mindar-image-target="targetIndex: 0">
            
            <a-light type="point" color="#ff0000" intensity="1.5" position="0 1 0"></a-light>
            
            <a-entity rotation="0 0 0">
                <a-gltf-model 
                    src="#anitModel" 
                    position="0 0 0.1" 
                    scale="0.12 0.12 0.12"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear">
                </a-gltf-model>

                <a-ring color="#ff0000" radius-inner="0.3" radius-outer="0.33" 
                        rotation="-90 0 0" position="0 -0.1 0"
                        animation="property: scale; to: 1.3 1.3 1.3; dur: 1500; loop: true; dir: alternate">
                </a-ring>
            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        const overlay = document.querySelector('#ar-overlay');
        const targetEntity = document.querySelector('#target0');

        // Hedef bulununca arayüzü gizle
        targetEntity.addEventListener("targetFound", () => {
            overlay.classList.add("hidden");
            console.log("Hedef bulundu, arayüz gizlendi.");
        });

        // Hedef kaybedilince arayüzü geri getir
        targetEntity.addEventListener("targetLost", () => {
            overlay.classList.remove("hidden");
        });

        // Kamera zorlama: 2 saniye sonra video elementini kontrol et
        window.addEventListener('load', () => {
            setTimeout(() => {
                const video = document.querySelector('video');
                if (video) {
                    video.style.position = "absolute";
                    video.style.top = "0";
                    video.style.left = "0";
                    video.style.zIndex = "1"; // Videoyu en alta al
                }
            }, 2000);
        });
    </script>
</body>
</html>
