<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.4/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
      #overlay {
        position: fixed; inset: 0; background: radial-gradient(circle, #2c3e50, #000);
        display: flex; flex-direction: column; justify-content: center;
        align-items: center; color: white; z-index: 9999;
      }
      #start-btn {
        padding: 18px 45px; font-size: 20px; background: #f1c40f;
        color: #2c3e50; border: none; border-radius: 50px; font-weight: bold;
        cursor: pointer; box-shadow: 0 5px 20px rgba(241, 196, 15, 0.4);
        transition: 0.3s;
      }
      #start-btn:active { transform: scale(0.9); }
    </style>
  </head>
  <body>

    <div id="overlay">
      <h1 style="letter-spacing: 3px; margin-bottom: 10px;">ANITKABİR AR</h1>
      <p style="margin-bottom: 30px; opacity: 0.8;">Kamerayı açmak için butona bas.</p>
      <button id="start-btn">DENEYİMİ BAŞLAT</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: yes;" 
      embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="anitModel" src="./model.glb"></a-asset-item>
        <audio id="anitSes" src="./bilgi.mp3" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target0" mindar-image-target="targetIndex: 0">
        <a-sphere position="0 0 0" radius="0.1" color="white" opacity="0.7"></a-sphere>
        
        <a-gltf-model src="#anitModel" position="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const btn = document.querySelector('#start-btn');
      const overlay = document.querySelector('#overlay');
      const sceneEl = document.querySelector('a-scene');
      const audio = document.querySelector('#anitSes');

      btn.addEventListener('click', () => {
        overlay.style.display = 'none';
        // Kamerayı ve sistemi el ile başlat
        const arSystem = sceneEl.systems['mindar-image-system'];
        arSystem.start(); 
        
        // Ses dosyasını "uyandır"
        if(audio) {
          audio.play().then(() => {
            audio.pause();
            audio.currentTime = 0;
          }).catch(e => console.log("Ses dosyası yüklenemedi."));
        }
      });

      // Hedef algılama
      const target0 = document.querySelector('#target0');
      target0.addEventListener("targetFound", () => {
        if(audio) audio.play();
      });
      target0.addEventListener("targetLost", () => {
        if(audio) audio.pause();
      });
    </script>
  </body>
</html>
