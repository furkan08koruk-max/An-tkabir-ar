<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #start-button {
        position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
        padding: 15px 30px; font-size: 18px; background: #e74c3c; color: white;
        border: none; border-radius: 8px; z-index: 999; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <button id="start-button">Kamerayı Başlat</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets (4).mind; autoStart: false;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="anitkabirModel" src="./model.glb"></a-asset-item>
        <audio id="anitkabirSes" src="./bilgi.mp3" preload="auto"></audio>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target0" mindar-image-target="targetIndex: 0">
        <a-box position="0 0 0" scale="0.5 0.5 0.5" color="red"></a-box>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector('#start-button');
      const sceneEl = document.querySelector('a-scene');
      const audioEl = document.querySelector('#anitkabirSes');

      startButton.addEventListener('click', () => {
        startButton.style.display = 'none';
        
        // Sistemi ve kamerayı başlat
        sceneEl.systems['mindar-image-system'].start(); 
        
        // Sesi kullanıcı izniyle aktifleştir
        audioEl.play().then(() => {
          audioEl.pause();
          audioEl.currentTime = 0;
        }).catch(e => console.log("Ses henüz hazır değil"));
      });

      // Hedef bulunduğunda ses çal
      const target0 = document.querySelector('#target0');
      target0.addEventListener("targetFound", event => {
        audioEl.play();
      });
      target0.addEventListener("targetLost", event => {
        audioEl.pause();
      });
    </script>
  </body>
</html>
