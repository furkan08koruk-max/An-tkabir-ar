<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anıtkabir Hologram Projesi | Profesyonel v5.0</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* Tam Ekran Fix */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: transparent !important; }
        
        /* A-Frame Sahnesini Şeffaf Yapıyoruz */
        a-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        
        /* Kamera Görüntüsü Fix */
        video, canvas { 
            position: absolute !important; 
            top: 50% !important; left: 50% !important; 
            transform: translate(-50%, -50%) !important; 
            min-width: 100% !important; min-height: 100% !important; 
            object-fit: cover !important; z-index: -1 !important; 
        }

        /* Kurumsal Anıtkabir Kırmızısı UI */
        #ar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none; transition: opacity 0.5s ease;
        }

        .scanner-box {
            width: 300px; height: 300px;
            border: 1px solid rgba(255, 0, 0, 0.4); border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2), inset 0 0 15px rgba(255, 0, 0, 0.1);
            position: relative; overflow: hidden;
        }

        .laser-line {
            width: 100%; height: 2px; background: rgba(255, 0, 0, 0.7);
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.7); position: absolute;
            top: 0; animation: scanAnimation 4s ease-in-out infinite;
        }

        @keyframes scanAnimation {
            0%, 100% { top: 10%; opacity: 0.2; }
            50% { top: 90%; opacity: 0.8; }
        }

        #status-label {
            margin-top: 30px; color: #ff3333; font-family: 'Segoe UI', sans-serif;
            font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 5px #000;
        }

        /* Bilgi Paneli */
        #bottom-panel {
            position: fixed; bottom: -120px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(0, 0, 0, 0.85); border: 1px solid #ff1111;
            border-radius: 15px; color: white; padding: 15px; text-align: center;
            z-index: 600; transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(255,0,0,0.2);
        }

        .panel-active { bottom: 30px !important; }
        .ui-hidden { opacity: 0 !important; }
    </style>
</head>
<body>

    <div id="ar-overlay">
        <div class="scanner-box"><div class="laser-line"></div></div>
        <div id="status-label">ANITKABİR GÖRSELİNİ TARATIN...</div>
    </div>

    <div id="bottom-panel">
        <h3 style="margin: 0; color: #ff3333;">ANITKABİR HOLOGRAMI</h3>
        <p style="margin: 5px 0 0 0; font-size: 13px; opacity: 0.8;">Wireframe & Nebula Effect v5.0</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #none; uiError: #none; uiLoading: #none;" 
        embedded 
        device-orientation-permission-ui="enabled: false"
        vr-mode-ui="enabled: false"
        renderer="colorManagement: true, physicallyCorrectLights, alpha: true">
        
        <a-assets>
            <a-asset-item id="modelAnitkabir" src="./models/anitkabir.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="targetNode" mindar-image-target="targetIndex: 0">
            
            <a-entity id="hologram-effect" position="0 0 0.1">
                
                <a-light type="point" color="#00ffff" intensity="1" position="-1 1 0.5"></a-light>
                <a-light type="point" color="#ff00ff" intensity="1" position="1 1 0.5"></a-light>
                
                <a-gltf-model 
                    id="anitModel"
                    src="#modelAnitkabir" 
                    position="0 0 0" 
                    scale="0.14 0.14 0.14"
                    material="wireframe: true; wireframeLinewidth: 1; color: #00ffff; emissive: #ff00ff; emissiveIntensity: 0.5; transparent: true; opacity: 0.8;"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear">
                </a-gltf-model>

                <a-sphere 
                    id="nebula"
                    position="0 0.2 0" 
                    radius="0.4" 
                    material="color: #40e0d0; emissive: #ff00ff; emissiveIntensity: 0.3; transparent: true; opacity: 0.1; side: double;"
                    animation="property: material.opacity; to: 0.2; dur: 2000; loop: true; dir: alternate">
                </a-sphere>

                <a-grid-helper position="0 -0.1 0" rotation="90 0 0" scale="0.1 0.1 0.1" color="#ff00ff" opacity="0.2"></a-grid-helper>

                <a-cylinder color="#ff00ff" height="2" radius="0.45" opacity="0.05" open-ended="true" side="double" position="0 0.7 0"></a-cylinder>
            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        const scene = document.querySelector('a-scene');
        const overlay = document.querySelector('#ar-overlay');
        const panel = document.querySelector('#bottom-panel');
        const target = document.querySelector('#targetNode');

        // Hedef Tespit Yönetimi
        target.addEventListener("targetFound", () => {
            overlay.classList.add("ui-hidden");
            panel.classList.add("panel-active");
        });

        target.addEventListener("targetLost", () => {
            overlay.classList.remove("ui-hidden");
            panel.classList.remove("panel-active");
        });

        // AR Hazır Olduğunda
        scene.addEventListener("arReady", () => {
            document.querySelector('#status-label').innerText = "GÖRSELİ OKUTUN";
        });

        // 6. Gelişmiş Shader Modifikasyonu (Model yüklendiğinde materyali ezmek için)
        const anitModelEl = document.querySelector('#anitModel');
        anitModelEl.addEventListener('model-loaded', () => {
            const mesh = anitModelEl.getObject3D('mesh');
            mesh.traverse((node) => {
                if (node.isMesh) {
                    node.material = new THREE.MeshPhongMaterial({
                        color: new THREE.Color(0x00ffff), // Cyan tel kafes
                        emissive: new THREE.Color(0xff00ff), // Magenta parlama
                        wireframe: true,
                        wireframeLinewidth: 2,
                        transparent: true,
                        opacity: 0.8,
                        side: THREE.DoubleSide
                    });
                }
            });
        });
    </script>
</body>
</html>
