<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anıtkabir AR Hologram Projesi | Furkan</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* Kamera ve Arayüz Ayarların (Dokunulmadı) */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        .mindar-ui-overlay { z-index: 1001 !important; }
        canvas { width: 100% !important; height: 100% !important; left: 0; top: 0; position: absolute; }
        video { width: 100% !important; height: 100% !important; object-fit: cover !important; position: absolute; top: 0; left: 0; }

        #ar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 0, 0, 0.6); z-index: 1000; display: flex; 
            flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.6s ease;
        }

        .scan-frame {
            width: 280px; height: 280px; border: 2px solid #ff0000;
            border-radius: 40px; position: relative;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4), inset 0 0 20px rgba(255, 0, 0, 0.2);
            display: flex; align-items: center; justify-content: center;
        }

        .scan-line {
            width: 90%; height: 3px; background: #ff0000;
            box-shadow: 0 0 15px #ff0000; position: absolute;
            animation: moveScan 3s infinite ease-in-out; opacity: 0.8;
        }

        @keyframes moveScan { 0%, 100% { transform: translateY(-110px); } 50% { transform: translateY(110px); } }

        #status-text {
            color: #ffffff; font-family: 'Segoe UI', sans-serif;
            font-weight: bold; margin-top: 30px; letter-spacing: 2px;
            text-align: center; text-transform: uppercase; text-shadow: 2px 2px 5px #000;
        }

        #hologram-card {
            position: fixed; bottom: -150px; left: 50%; transform: translateX(-50%);
            width: 85%; background: linear-gradient(135deg, #8b0000 0%, #000000 100%);
            border: 2px solid #ff0000; border-radius: 20px; color: #fff;
            padding: 20px; text-align: center; z-index: 1002;
            transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .active-info { bottom: 40px !important; }
        .hidden { opacity: 0; pointer-events: none; }
        
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,0,0,0.3);
            border-top: 4px solid #ff0000; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="ar-overlay">
        <div class="spinner"></div>
        <div class="scan-frame">
            <div class="scan-line"></div>
        </div>
        <div id="status-text">ANITKABİR GÖRSELİNİ<br><span style="color:#ff0000; font-size: 20px;">TARAYIN</span></div>
    </div>

    <div id="hologram-card">
        <h2 style="margin: 0; letter-spacing: 2px;">ANITKABİR</h2>
        <div style="width: 50px; height: 2px; background: #ff0000; margin: 10px auto;"></div>
        <p style="margin: 0; font-size: 14px; opacity: 0.8;">3D Hologram Modeli Aktif</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #none; uiError: #none; uiLoading: #none; autoStart: true; filterMinCF:0.0001; filterBeta: 0.001;" 
        embedded color-space="sRGB" renderer="colorManagement: true, antialias: true" 
        vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="anitModel" src="./models/anitkabir.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="anitkabirTarget" mindar-image-target="targetIndex: 0">
            
            <a-light type="spot" color="#ff0000" intensity="3" position="0 -1 0.5" angle="45"></a-light>
            <a-light type="point" color="#ff0000" intensity="1" position="0 1 0"></a-light>

            <a-entity rotation="0 0 0" animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
                
                <a-gltf-model src="#anitModel" scale="0.15 0.15 0.15" position="0 0 0.1"></a-gltf-model>

                <a-plane rotation="-90 0 0" position="0 -0.1 0" width="0.8" height="0.8" 
                         material="src: https://i.imgur.com/89N6j9B.png; transparent: true; opacity: 0.3; color: #ff0000;">
                </a-plane>

                <a-ring color="#ff0000" radius-inner="0.3" radius-outer="0.32" rotation="-90 0 0" position="0 -0.12 0"
                        animation="property: scale; to: 1.3 1.3 1.3; dur: 1500; loop: true; dir: alternate">
                </a-ring>
                
                <a-ring color="#ff3333" radius-inner="0.4" radius-outer="0.41" rotation="-90 0 0" position="0 -0.15 0"
                        animation="property: opacity; to: 0; dur: 2000; loop: true; easing: linear">
                </a-ring>

                <a-cylinder color="#ff0000" height="0.6" radius="0.01" position="0.2 0.2 0.2" opacity="0.5"></a-cylinder>
                <a-cylinder color="#ff0000" height="0.6" radius="0.01" position="-0.2 0.2 0.2" opacity="0.5"></a-cylinder>
                <a-cylinder color="#ff0000" height="0.6" radius="0.01" position="0.2 0.2 -0.2" opacity="0.5"></a-cylinder>
                <a-cylinder color="#ff0000" height="0.6" radius="0.01" position="-0.2 0.2 -0.2" opacity="0.5"></a-cylinder>

            </a-entity>

            <a-entity position="0 -0.2 0">
                <a-sphere color="#ff0000" radius="0.02" position="0 0 0"
                    animation="property: position; to: 0 1 0; dur: 3000; loop: true; easing: linear; delay: 0">
                </a-sphere>
                <a-sphere color="#ff0000" radius="0.015" position="0.1 0 -0.1"
                    animation="property: position; to: 0.1 1 -0.1; dur: 4000; loop: true; easing: linear; delay: 500">
                </a-sphere>
                <a-sphere color="#ff0000" radius="0.01" position="-0.15 0 0.1"
                    animation="property: position; to: -0.15 1 0.1; dur: 3500; loop: true; easing: linear; delay: 1000">
                </a-sphere>
            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const overlay = document.querySelector('#ar-overlay');
        const card = document.querySelector('#hologram-card');
        const targetEntity = document.querySelector('#anitkabirTarget');

        sceneEl.addEventListener("arReady", () => {
            document.querySelector('#status-text').innerHTML = "GÖRSEL HAZIR<br><span style='color:#ff0000'>TARAMAYA BAŞLAYIN</span>";
        });

        targetEntity.addEventListener("targetFound", () => {
            overlay.classList.add("hidden");
            card.classList.add("active-info");
        });

        targetEntity.addEventListener("targetLost", () => {
            overlay.classList.remove("hidden");
            card.classList.remove("active-info");
        });
    </script>
</body>
</html>
