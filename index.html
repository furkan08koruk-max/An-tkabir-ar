<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anıtkabir AR Hologram Deneyimi v4.0</title>
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

    <style>
        /* 2. Kurumsal Anıtkabir Kırmızısı Tema CSS */
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; }

        /* Yükleme ve Tarama Ekranı (Derin Kırmızı Tonlar) */
        #ar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(20,0,0,0.85) 0%, rgba(0,0,0,1) 100%);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #ff3333; text-shadow: 0 0 10px rgba(255,51,51,0.7);
            transition: all 0.6s ease;
        }

        .loader-container { position: relative; width: 180px; height: 180px; margin-bottom: 25px; }

        .loader-ring {
            box-sizing: border-box; display: block; position: absolute;
            width: 100%; height: 100%; border: 6px solid transparent;
            border-radius: 50%; border-top-color: #ff1111;
            animation: spin 1.2s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Sadeleştirilmiş Tarama Çerçevesi */
        .scan-frame {
            width: 260px; height: 180px; border: 1px solid rgba(255,17,17,0.25);
            border-radius: 12px; position: relative; background: rgba(255,0,0,0.03);
            box-shadow: inset 0 0 15px rgba(255,0,0,0.05);
        }

        .scan-bar {
            width: 100%; height: 2px; background: #ff1111;
            position: absolute; top: 0; box-shadow: 0 0 12px #ff1111;
            animation: moveBar 3.5s ease-in-out infinite; opacity: 0.6;
        }

        @keyframes moveBar { 0%, 100% { top: 10%; } 50% { top: 90%; } }

        #status-text { margin-top: 15px; font-weight: bold; letter-spacing: 2px; font-size: 14px; text-transform: uppercase; }

        /* Bilgi Kartı (Türk Bayrağı Kırmızısı) */
        #info-card {
            position: fixed; bottom: -120px; left: 50%; transform: translateX(-50%);
            width: 85%; background: rgba(40, 0, 0, 0.95); border: 2px solid #ff1111;
            border-radius: 15px; color: white; padding: 18px; text-align: center;
            z-index: 999; transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
        }

        .show-info { bottom: 35px !important; }
        .hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ar-overlay">
        <div class="loader-container">
            <div class="loader-ring"></div>
            <div class="scan-frame">
                <div class="scan-bar"></div>
            </div>
        </div>
        <div id="status-text">Sistem Başlatılıyor...</div>
        <p style="color: #fff; font-size: 12px; margin-top: 8px;">Kamera İznini Onaylayın</p>
    </div>

    <div id="info-card">
        <h3 style="margin: 0; color: #ff3333; letter-spacing: 1px;">ANITKABİR HOLOGRAMI</h3>
        <p style="margin: 6px 0 0 0; font-size: 13px; opacity: 0.9;">Görsel Başarıyla Tarandı - Ibrahim Yildirim</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #none; uiError: #none; uiLoading: #none; filterMinCF:0.0001; filterBeta: 0.001;" 
        embedded 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights, antialias: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="anitkabirModel" src="./models/anitkabir.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="mainTarget" mindar-image-target="targetIndex: 0">
            
            <a-entity id="hologram-wrapper">
                
                <a-light type="spot" color="#ff1111" intensity="1.8" position="0 2 1" angle="45"></a-light>
                <a-light type="ambient" color="#202020"></a-light>

                <a-gltf-model 
                    src="#anitkabirModel" 
                    position="0 0.1 0.1" 
                    scale="0.12 0.12 0.12"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear">
                </a-gltf-model>

                <a-ring color="#ff1111" radius-inner="0.32" radius-outer="0.34" rotation="-90 0 0" 
                        position="0 -0.15 0" opacity="0.6"
                        animation="property: scale; to: 1.5 1.5 1.5; dur: 2000; loop: true; dir: alternate">
                </a-ring>
                
                <a-ring color="#ff1111" radius-inner="0.45" radius-outer="0.46" rotation="-90 0 0" 
                        position="0 -0.2 0"
                        animation="property: opacity; to: 0; dur: 1800; loop: true; easing: linear">
                </a-ring>
            </a-entity>

        </a-entity>
    </a-scene>

    <script>
        // 4. Sistem Kontrol Mekanizması
        const sceneEl = document.querySelector('a-scene');
        const overlay = document.querySelector('#ar-overlay');
        const infoCard = document.querySelector('#info-card');
        const statusText = document.querySelector('#status-text');

        // Kamera ve Kütüphane Hazır Olduğunda
        sceneEl.addEventListener("arReady", () => {
            statusText.innerText = "Görseli (anıtkabir.jpg) Taratın";
            console.log("AR Hazır");
        });

        // Kritik Kamera Hatası Denetleyicisi
        sceneEl.addEventListener("arError", () => {
            statusText.innerText = "Kamera Başlatılamadı!";
            statusText.style.color = "#ffffff";
            console.error("Kamera Erişimi Engellendi");
        });

        // 5. Hedef Bulundu/Kaybedildi Yönetimi
        const targetEntity = document.querySelector('#mainTarget');
        targetEntity.addEventListener("targetFound", () => {
            // Arayüzü gizle, bilgi kartını göster
            overlay.classList.add("hidden");
            infoCard.classList.add("show-info");
            console.log("Hologram Aktif");
        });

        targetEntity.addEventListener("targetLost", () => {
            // Arayüzü tekrar göster
            overlay.classList.remove("hidden");
            infoCard.classList.remove("show-info");
        });
    </script>
</body>
</html>
